# Axiom Editor – Theme Registry
# Each entry defines a theme available in the command palette / theme picker.
#
# Fields:
#   id        – unique key used in store and JS imports (must match the JS loader key)
#   label     – display name shown in the picker
#   kind      – "dark" or "light" (controls which icon/badge is shown)
#   package   – npm package to import the CM6 theme extension from
#   export    – named export within that package (or "default")
#
# UI palette overrides (applied to CSS variables when theme is active):
#   bg_main, bg_sidebar, bg_tabs, bg_hover, bg_active,
#   border_color, text_main, text_muted, text_active,
#   accent_color, context_bg, context_border, context_hover, context_text

themes:
  - id: one-dark
    label: One Dark Pro
    kind: dark
    package: "@codemirror/theme-one-dark"
    export: oneDark
    bg_main: "#282c34"
    bg_sidebar: "#21252b"
    bg_tabs: "#181a1f"
    bg_hover: "#2c313a"
    bg_active: "#3a3f4b"
    border_color: "#181a1f"
    text_main: "#abb2bf"
    text_muted: "#7f848e"
    text_active: "#d7dae0"
    accent_color: "#528bff"
    context_bg: "#252526"
    context_border: "#454545"
    context_hover: "#094771"
    context_text: "#cccccc"

